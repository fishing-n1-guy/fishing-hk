<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🐟 香港釣魚資訊站 - by 小婷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a1628;color:#e0e8f0;padding:16px;max-width:800px;margin:0 auto}
h1{text-align:center;font-size:20px;padding:16px;background:linear-gradient(135deg,#0a3d62,#0d5a7a);border-radius:14px;margin-bottom:14px}
.card{background:#0f2a45;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #1a3a5a}
.ct{font-size:15px;font-weight:600;margin-bottom:10px;color:#3dc1d3}
.g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.it{background:rgba(10,61,98,0.4);border-radius:10px;padding:12px;text-align:center}
.ic{font-size:24px} .lb{font-size:11px;color:#8899aa;margin:3px 0} .vl{font-size:22px;font-weight:700;color:#fff} .sb{font-size:11px;color:#8899aa}
.scr{text-align:center;font-size:42px;font-weight:700;margin:10px 0}
.br{display:flex;gap:4px;margin:12px 0} .br div{flex:1;height:6px;border-radius:3px;background:#1a3a5a} .br .ok{background:#3dc1d3}
.sc{font-size:13px;color:#8899aa;text-align:center;line-height:1.6}
.fr{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fi{background:rgba(10,61,98,0.3);border-radius:10px;padding:10px;text-align:center;border:1px solid #1a3a5a}
.fn{font-size:15px;font-weight:600;margin:3px 0} .ft{font-size:10px;color:#8899aa;line-height:1.4}
.nav{display:flex;gap:6px;margin:14px 0}
.nav a{flex:1;padding:8px;background:#0f2a45;border-radius:20px;color:#3dc1d3;text-decoration:none;font-size:13px;text-align:center;border:1px solid #1a3a5a}
.ftr{text-align:center;font-size:11px;color:#8899aa;padding:16px;line-height:1.5}
.refresh{text-align:center;font-size:12px;color:#3dc1d3;padding:8px;cursor:pointer}
.refresh:hover{text-decoration:underline}
.loading{text-align:center;padding:20px;color:#8899aa}
/* Tide styles */
.tsel{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.tsel button{padding:7px 14px;border:1px solid #1a3a5a;border-radius:18px;background:#0f2a45;color:#3dc1d3;font-size:14px;cursor:pointer}
.tsel button.act{border-color:#3dc1d3;background:rgba(61,193,211,0.15)}
.tdrop{width:100%;padding:10px 12px;border:1px solid #1a3a5a;border-radius:10px;background:#0f2a45;color:#e0e8f0;font-size:15px;cursor:pointer;margin:4px 0 10px;appearance:auto;-webkit-appearance:auto}
.tdrop option{background:#0a1628;color:#e0e8f0;padding:8px}
.te{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.tei{flex:1;min-width:90px;background:rgba(10,61,98,0.3);border-radius:12px;padding:12px;text-align:center;border:1px solid #1a3a5a}
.ticon{font-size:24px}
.ttime{font-size:13px;color:#8899aa;margin:3px 0}
.theight{font-size:20px;font-weight:700;color:#fff}
.ttype{font-size:11px;color:#8899aa}
.tch{display:flex;align-items:flex-end;height:80px;gap:2px;margin:10px 0;padding:4px 0}
.tch div{flex:1;border-radius:2px 2px 0 0;min-height:2px;position:relative}
.tch .thnw{background:linear-gradient(to top,#3dc1d3,transparent)}
.tch .thfu{background:linear-gradient(to top,#f39c12,transparent)}
.tst{display:flex;justify-content:space-between;font-size:10px;color:#8899aa;margin:0 0 4px}
.tcur b{color:#3dc1d3}
.tcur{background:rgba(61,193,211,0.1);border-radius:10px;padding:10px;text-align:center;font-size:14px;margin:8px 0}
/* Weather icons */
.wi{font-size:28px;margin:4px 0}
.wdesc{font-size:14px;color:#3dc1d3;text-align:center;margin:4px 0}
.wx{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}
.wxi{background:rgba(10,61,98,0.3);border-radius:10px;padding:10px;text-align:center;border:1px solid #1a3a5a}
.wxlb{font-size:10px;color:#8899aa;margin:2px 0}
.wxvl{font-size:16px;font-weight:600;color:#fff}
.wxic{font-size:20px}
</style>
</head>
<body>

<h1>🐟 香港釣魚資訊站<br><span style="font-size:13px;color:#8899aa">by 小婷 · <span id="updateTime">載入中...</span></span></h1>

<div class="nav">
  <a href="#w">🌤️ 天氣</a>
  <a href="#t">🌊 流水</a>
  <a href="#f">🐟 魚種</a>
  <a href="#c">📝 記錄</a>
</div>

<div class="card" id="w">
  <div class="ct">🌤️ 即時天氣</div>
  <div id="weatherGrid"><div class="loading">⏳ 載入天氣資料中...</div></div>
  <div class="refresh" onclick="refreshWeather()">🔄 點擊更新天氣</div>
</div>

<div class="card" id="scoreCard">
  <div class="ct">🎯 釣魚指數</div>
  <div class="scr" id="scoreVal">--</div>
  <div class="br" id="scoreBars"></div>
  <div class="sc" id="scoreMsg"></div>
</div>

<div class="card" id="forecastCard">
  <div class="ct">📅 未來三天</div>
  <div id="forecastRows"></div>
</div>

<div class="card" id="t">
  <div class="ct">🌊 潮汐（流水）<span style="font-size:11px;color:#8899aa" id="tideStationLabel"></span></div>
  <div id="tideExtremes"></div>
  <div id="tideChart"><div class="loading">⏳ 載入潮汐資料中...</div></div>
  <div id="tideCurrent"></div>
  <div class="refresh" onclick="loadTide()">🔄 點擊更新潮汐</div>
</div>

<div class="card" id="f">
  <div class="ct">🐟 香港魚種圖鑑</div>
  <div class="fg" id="fishGrid"></div>
</div>

<div class="card" id="c">
  <div class="ct">📝 釣獲記錄</div>
  <div style="font-size:14px;text-align:center;padding:20px;color:#8899aa">
    記錄功能需要 browser 嘅 localStorage<br>
    由小婷為 Jay 製作 🎣
  </div>
</div>

<div class="ftr">
  資料來源：Open-Meteo<br>
  每次開頁自動更新天氣資料 🎣
</div>

<script>
const HK_LAT=22.3193, HK_LON=114.1694;
const WIND_DIR=["北","東北偏北","東北","東北偏東","東","東南偏東","東南","東南偏南","南","西南偏南","西南","西南偏西","西","西北偏西","西北","西北偏北"];
const BF_NAMES=["無風","軟風","輕風","微風","和風","清風","強風","疾風","大風","烈風","暴風","狂風","颶風"];

// HK regions for marine data (lat, lon, name)
const MARINE_SPOTS = {
  main: [22.3193, 114.1694, "香港整體水域"],
  east: [22.2000, 114.3500, "東水（果洲/橫瀾）"],
  west: [22.3000, 113.9500, "西水（青龍頭/大嶼山）"],
  south: [22.1500, 114.2000, "南水（蒲台/擔桿）"],
  north: [22.4200, 114.3200, "東北（塔門/黃石）"],
};
var MARINE_CACHE = {};

// Weather icons/descriptions by WMO code
const WMO = {
  0:["☀️","晴天"],1:["🌤️","大致天晴"],2:["⛅","多雲"],3:["☁️","密雲"],
  45:["🌫️","霧"],48:["🌫️","霧"],
  51:["🌦️","微雨"],53:["🌦️","小雨"],55:["🌧️","中雨"],
  61:["🌦️","微雨"],63:["🌧️","中雨"],65:["🌧️","大雨"],
  71:["🌨️","小雪"],73:["🌨️","中雪"],75:["❄️","大雪"],
  80:["🌦️","陣雨"],81:["🌧️","中陣雨"],82:["🌧️","大陣雨"],
  95:["⛈️","雷暴"],96:["⛈️","雷暴+雹"],99:["⛈️","雷暴+雹"]
};
const FISH = [
  ["石斑","Grouper","30-100cm","全年","中級"],["黃腳鱲","Yellowfin Bream","20-50cm","秋冬","初級"],
  ["黑鱲","Black Bream","20-45cm","冬季","初級"],["紅鮋","Red Gurnard","15-35cm","夏秋","初級"],
  ["泥鯭","Rabbitfish","15-30cm","夏季","初級"],["牙帶","Ribbonfish","50-120cm","秋冬","進階"],
  ["黃花魚","Yellow Croaker","20-50cm","春季","進階"],["沙鑽","Sand Whiting","15-30cm","全年","初級"],
  ["立魚","Sea Bream","20-60cm","秋冬季","初級"],["火點","Spotty Grouper","20-40cm","夏季","中級"],
  ["左口","Flatfish","20-50cm","全年","中級"],["星鱸","Spotted Sea Bass","30-80cm","秋冬","中級"],
  ["魷魚","Squid","15-40cm","夏秋","初級"],["真鯛","Red Sea Bream","25-60cm","冬季","進階"],
  ["鯆魚","Ray","50-150cm","夏秋","進階"],["黃鰭鮪","Yellowfin Tuna","50-200cm","夏季","專家"]
];

// Render fish
(function(){var g=document.getElementById('fishGrid');g.innerHTML=FISH.map(f=>'<div class="fi"><div>🐟</div><div class="fn">'+f[0]+'</div><div class="ft">'+f[1]+'<br>'+f[2]+' · '+f[3]+' · '+f[4]+'</div></div>').join('');})();

function renderWeather(data, marineData) {
  var now=new Date(),h=now.getHours(),today=now.toISOString().slice(0,10);
  var times=data.hourly.time,idx=0;
  for(var i=0;i<times.length;i++){if(times[i].startsWith(today)&&parseInt(times[i].slice(11,13))>=h){idx=i;break}}
  
  var t=data.hourly.temperature_2m[idx];
  var ws=data.hourly.wind_speed_10m[idx];
  var wd=data.hourly.wind_direction_10m[idx];
  var gu=data.hourly.wind_gusts_10m[idx];
  var wc=data.hourly.weather_code[idx];
  var hu=data.hourly.relative_humidity_2m[idx];
  var pp=data.hourly.precipitation_probability[idx];
  var uv=data.hourly.uv_index[idx];
  
  var bf=Math.min(12,Math.round(ws/10));
  var dir=WIND_DIR[Math.round(wd/22.5)%16];
  var wmo=WMO[wc]||["❓","未知"];
  
  // Wind description - 吹咩風
  var windDesc = "吹" + dir + "風 " + bf + "級";
  if (bf >= 8) windDesc += "⚠️";
  
  // Weather description with emoji
  var dayIcons = ["🌙","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌞","🌙"];
  var timeIcon = dayIcons[h];
  
  var mainW = '<div style="text-align:center;padding:4px 0">' +
    '<span style="font-size:36px">' + wmo[0] + '</span>' +
    '<div class="wdesc">' + wmo[1] + ' · ' + t.toFixed(1) + '°C</div>' +
    '</div>';
  
  // Wind + wave grid
  var mainG = '<div class="g">' +
    '<div class="it"><div class="ic">💨</div><div class="lb">風力</div><div class="vl">' + bf + '級</div><div class="sb">' + windDesc + '</div></div>' +
    '<div class="it"><div class="ic">💥</div><div class="lb">陣風</div><div class="vl">' + gu.toFixed(0) + '</div><div class="sb">km/h</div></div>' +
    '<div class="it"><div class="ic">💧</div><div class="lb">濕度</div><div class="vl">' + (hu !== undefined ? hu + '%' : '--') + '</div><div class="sb">降雨 ' + (pp !== undefined ? pp + '%' : '--') + '</div></div>' +
    '<div class="it"><div class="ic">☀️</div><div class="lb">紫外線</div><div class="vl">' + (uv !== undefined ? uv.toFixed(1) : '--') + '</div><div class="sb">' + (uv < 3 ? '溫和' : uv < 6 ? '中等' : uv < 8 ? '強烈' : '極高⚠️') + '</div></div>' +
    '</div>';
  
  // Area wave heights
  var waveHtml = '<div class="wx">';
  var areaOrder = ["east","south","main","west","north"];
  // Map fishing spots to nearest marine zone
  var spotToZone = {};
  ["果洲群島","東龍洲","蒲台群島","橫瀾島","宋崗","擔桿列島","白腊","浪茄","大浪灣","龍蝦灣","清水灣","布袋澳"].forEach(function(s){spotToZone[s]="east";});
  ["蚊洲","分流","塘福","石壁","大澳","索罟群島","沙洲","龍鼓灘","龍珠島"].forEach(function(s){spotToZone[s]="west";});
  ["南丫島","香港仔","赤柱","石澳","昂船洲","油塘","筲箕灣"].forEach(function(s){spotToZone[s]="south";});
  ["塔門","黃石","大灘","海下","赤洲","鴨洲","吉澳","東平洲","往灣洲","娥眉洲","榕樹凹","荔枝窩","三椏涌","三門仔","馬料水","大尾篤","黃竹角咀","西貢","糧船灣","滘西洲","吊鐘洲","甕缸群島"].forEach(function(s){spotToZone[s]="north";});
  ["青龍頭","大小磨刀","小欖","青山灣","黃金海岸","大欖涌","屯門","欣澳","陰澳","東涌","梅窩","貝澳","長沙","馬灣","葵涌","青衣"].forEach(function(s){spotToZone[s]="west";});
  
  areaOrder.forEach(function(key) {
    var md = marineData[key];
    if (!md) return;
    var idx2 = 0;
    for(var j=0;j<md.hourly.time.length;j++){
      if(md.hourly.time[j].startsWith(today)&&parseInt(md.hourly.time[j].slice(11,13))>=h){idx2=j;break}
    }
    var wv = md.hourly.wave_height[idx2] || 0;
    var sw = md.hourly.swell_wave_height[idx2] || 0;
    var wdir = md.hourly.wave_direction ? (md.hourly.wave_direction[idx2] || 0) : 0;
    var dirNames = ["北","東北","東","東南","南","西南","西","西北"];
    var wdName = dirNames[Math.round(wdir/45)%8];
    var ss = "平靜"; if(wv>=4) ss="巨浪"; else if(wv>=2.5) ss="非常大浪"; else if(wv>=1.25) ss="大浪"; else if(wv>=0.5) ss="中浪"; else if(wv>=0.1) ss="小浪";
    var name = MARINE_SPOTS[key][2].split("（")[0];
    waveHtml += '<div class="wxi"><div class="wxic">🌊</div><div class="wxlb">'+name+'</div><div class="wxvl">'+wv.toFixed(2)+'m</div><div class="wxlb">'+ss+' · '+wdName+'</div></div>';
  });
  waveHtml += '</div>';
  
  // Sunrise/Sunset
  var sr = "", ss2 = "";
  if (data.daily && data.daily.sunrise && data.daily.sunrise[0]) {
    var srd = new Date(data.daily.sunrise[0]);
    var ssd = new Date(data.daily.sunset[0]);
    sr = String(srd.getHours()).padStart(2,'0')+':'+String(srd.getMinutes()).padStart(2,'0');
    ss2 = String(ssd.getHours()).padStart(2,'0')+':'+String(ssd.getMinutes()).padStart(2,'0');
  }
  
  var sunHtml = '<div style="display:flex;justify-content:center;gap:16px;padding:6px 0;font-size:13px;color:#8899aa">' +
    '<span>🌅 日出 ' + sr + '</span>' +
    '<span>🌇 日落 ' + ss2 + '</span>' +
    '</div>';
  
  document.getElementById('weatherGrid').innerHTML = mainW + mainG + sunHtml + waveHtml;
  
  // Score
  var score=50;
  if(bf<=3)score+=25;else if(bf<=5)score+=10;else if(bf<=7)score-=10;else score-=30;
  var avgWv = 0; var wvCount = 0;
  for(var k in marineData){ var d=marineData[k]; if(d&&d.hourly.wave_height[idx]){ avgWv+=d.hourly.wave_height[idx]; wvCount++; } }
  var wvAvg = wvCount>0 ? avgWv/wvCount : 0;
  if(wvAvg<0.3)score+=10;else if(wvAvg<1)score+=5;else if(wvAvg>2)score-=20;
  if(t>=22&&t<=30)score+=15;else if(t<15||t>35)score-=10;
  score=Math.max(0,Math.min(100,score));
  
  var se=document.getElementById('scoreVal');se.textContent=score+'/100';se.style.color=score>=65?'#2ecc71':score>=45?'#f39c12':'#e74c3c';
  document.getElementById('scoreBars').innerHTML=Array(10).fill(0).map(function(_,i){return '<div'+(i*10<score?' class="ok"':'')+'></div>';}).join('');
  var msgs=["😢 唔係好適合釣魚","😐 麻麻地","👌 一般，可以一試","👍 唔錯，可以出發","🏆 極佳！今日好適合釣魚！"];
  document.getElementById('scoreMsg').textContent=msgs[Math.min(4,Math.floor(score/25))]+'  🌬️'+bf+'級 🌊'+wvAvg.toFixed(2)+'m 🌡️'+t.toFixed(1)+'°C';
  
  // 3-day forecast
  var days=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  var fr='';for(var i=0;i<Math.min(3,data.daily.time.length);i++){
    var d=new Date(data.daily.time[i]+'T12:00:00'),mx=data.daily.temperature_2m_max[i],mn=data.daily.temperature_2m_min[i];
    var wf=Math.min(12,Math.round((data.daily.wind_speed_10m_max[i]||0)/10));
    var wc2=data.daily.weather_code ? (data.daily.weather_code[i]||0) : 0;
    var wmo2=WMO[wc2]||["❓",""];
    var pp2=data.daily.precipitation_probability_max ? (data.daily.precipitation_probability_max[i]||0) : 0;
    fr+='<div class="fr"><span style="font-size:14px">'+wmo2[0]+'</span><b>'+(d.getMonth()+1)+'/'+d.getDate()+'('+days[d.getDay()]+')</b><span>'+mn.toFixed(0)+'-'+mx.toFixed(0)+'°C</span><span>💨'+wf+'級</span><span>🌧️'+pp2+'%</span></div>';
  }
  document.getElementById('forecastRows').innerHTML=fr;
  
  var n=new Date();document.getElementById('updateTime').textContent=n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate()+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

async function refreshWeather(){
  try{
    var w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+HK_LAT+'&longitude='+HK_LON+'&hourly=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,uv_index,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,wind_speed_10m_max,weather_code,precipitation_probability_max,sunrise,sunset&timezone=Asia/Hong_Kong&forecast_days=3').then(function(r){return r.json();});
    
    // Fetch marine data for multiple HK regions
    var marineKeys = Object.keys(MARINE_SPOTS);
    var marinePromises = marineKeys.map(function(key) {
      var spot = MARINE_SPOTS[key];
      return fetch('https://marine-api.open-meteo.com/v1/marine?latitude='+spot[0]+'&longitude='+spot[1]+'&hourly=wave_height,wave_direction,swell_wave_height,wind_wave_height&timezone=Asia/Hong_Kong&forecast_days=2').then(function(r){return r.json();}).then(function(d){MARINE_CACHE[key]=d;}).catch(function(){});
    });
    
    await Promise.all(marinePromises);
    renderWeather(w, MARINE_CACHE);
  }catch(e){document.getElementById('weatherGrid').innerHTML='<div style="text-align:center;padding:20px;color:#e74c3c">❌ 載入失敗，請檢查網絡連線</div>';}
}

refreshWeather();

// === 🌊 潮汐功能 ===
var TIDE_STATIONS = {
  "CCH":"長洲","KLW":"高流灣","TMW":"大廟灣","SPW":"石壁","LOP":"樂安排",
  "TAO":"大澳","CLK":"赤鱲角(東)","MWC":"馬灣","TPK":"大埔滘","TBT":"尖鼻咀",
  "CMW":"芝麻灣","WAG":"橫瀾島","KCT":"葵涌","QUB":"鰂魚涌"
};
var TIDE_ORDER = ["CCH","KLW","TMW","SPW","LOP","TAO","CLK","MWC","TPK","TBT","CMW","WAG","KCT","QUB"];

// Fishing spots → nearest tide station
var FISHING_SPOTS = {
  // 東水

// Group spots by region for UI
var SPOT_REGIONS = {
  "東水":["果洲群島","東龍洲","蒲台群島","橫瀾島","宋崗","擔桿列島","白腊","浪茄","大浪灣","龍蝦灣","清水灣","布袋澳"],
  "西水":["蚊洲","青龍頭","大小磨刀","龍鼓灘","小欖","青山灣","黃金海岸","大欖涌","沙洲","龍珠島","屯門","欣澳","陰澳"],
  "東北":["塔門","黃石碼頭","大灘","海下","赤洲","鴨洲","吉澳","東平洲","往灣洲","娥眉洲","榕樹凹","荔枝窩","三椏涌"],
  "西貢":["西貢碼頭","糧船灣","滘西洲","吊鐘洲","甕缸群島"],

  "南部":["南丫島","索罟群島","大鴉洲","香港仔","赤柱","石澳","昂船洲","青衣","油塘","筲箕灣"],

function tideDateStr(month, day) {
  var now = new Date();
  return (now.getMonth()+1)==month&&now.getDate()==day?"今日":(now.getMonth()+1)==month&&now.getDate()+1==day?"明日":
    (now.getMonth()+1)==month&&now.getDate()+2==day?"後日":month+"/"+day;
}

function renderTideExtremes(exList, stationCode, spotName) {
  // Spot selector
  var h = '<div style="margin-bottom:6px;font-size:11px;color:#8899aa">📍 選擇釣魚位置（自動對應最近潮汐站）</div>';
  
  // Region buttons
  var regionKeys = Object.keys(SPOT_REGIONS);
  var activeRegion = ACTIVE_REGION;
  
  // If a spot is selected and no region set, find its region
  if (spotName && !activeRegion) {
    for (var r in SPOT_REGIONS) {
      if (SPOT_REGIONS[r].indexOf(spotName) >= 0) { activeRegion = r; break; }
    }
  }
  
  // Show region tabs
  h += '<div class="tsel" style="margin:4px 0">';
  regionKeys.forEach(function(r) {
    h += '<button' + (r == activeRegion ? ' class="act"' : '') + ' onclick="toggleRegion(\''+r+'\')">'+r+'</button>';
  });
  h += '</div>';
  
  // Show spots in active region as dropdown
  if (activeRegion && SPOT_REGIONS[activeRegion]) {
    h += '<select class="tdrop" onchange="if(this.value)loadTideSpot(this.value)">';
    h += '<option value="">— 揀釣點 —</option>';
    SPOT_REGIONS[activeRegion].forEach(function(s) {
      var sel = (s == spotName) ? ' selected' : '';
      h += '<option value="'+s+'"'+sel+'>🎯 '+s+'</option>';
    });
    h += '</select>';
  }
  
  // Station name indicator
  if (spotName) {
    h += '<div style="text-align:center;font-size:10px;color:#8899aa;margin:4px 0 8px">📍 ' + spotName + ' → 參考 ' + TIDE_STATIONS[stationCode] + ' 潮汐站</div>';
  }
  
  // Station selector (advanced)
  h += '<div style="font-size:11px;color:#667788;margin:8px 0 4px">⚙️ 直接揀潮汐站：</div><div class="tsel">';
  TIDE_ORDER.forEach(function(c) {
    h += '<button' + (c == stationCode && !spotName ? ' class="act"' : '') + ' onclick="loadTide(\''+c+'\')">'+TIDE_STATIONS[c]+'</button>';
  });
  h += '</div>';
  
  if (!exList || exList.length == 0) {
    h += '<div style="text-align:center;padding:12px;color:#8899aa;font-size:13px">暫無潮汐資料</div>';
    document.getElementById('tideExtremes').innerHTML = h;
    return;
  }
  
  exList.forEach(function(dayData) {
    var label = tideDateStr(dayData.month, dayData.day);
    h += '<div style="font-size:11px;color:#8899aa;margin:8px 0 4px">— ' + label + ' —</div>';
    h += '<div class="te">';
    dayData.extremes.forEach(function(e) {
      var icon = e.type == 'high' ? '🔺' : '🔻';
      var lbl = e.type == 'high' ? '漲潮' : '退潮';
      if (e.height_m < 0.5) lbl += '(乾潮)';
      h += '<div class="tei"><div class="ticon">'+icon+'</div><div class="ttime">'+e.time+'</div><div class="theight">'+e.height_m.toFixed(2)+'m</div><div class="ttype">'+lbl+'</div></div>';
    });
    h += '</div>';
  });
  
  document.getElementById('tideExtremes').innerHTML = h;
}

// Region toggle state
var ACTIVE_REGION = null;

function toggleRegion(r) {
  ACTIVE_REGION = (ACTIVE_REGION == r) ? null : r;
  loadTide();
}

function loadTideSpot(spotName) {
  var stn = FISHING_SPOTS[spotName];
  if (!stn) return;
  ACTIVE_SPOT = spotName;
  loadTide(stn, spotName);
}

var ACTIVE_SPOT = null;

function renderTideChart(hourlyList) {
  var h = '';
  if (!hourlyList || hourlyList.length == 0) {
    document.getElementById('tideChart').innerHTML = '<div style="text-align:center;padding:12px;color:#8899aa;font-size:13px">暫無潮汐圖表</div>';
    return;
  }
  
  var dayData = hourlyList[0];
  var heights = dayData.heights;
  var minH = dayData.min_h, maxH = dayData.max_h;
  var range = Math.max(maxH - minH, 0.5);
  
  h += '<div class="tst"><span>'+minH.toFixed(2)+'m</span><span style="font-size:11px;color:#3dc1d3">今日潮汐曲線</span><span>'+maxH.toFixed(2)+'m</span></div>';
  h += '<div class="tch">';
  
  var now = new Date();
  var currentHour = now.getHours();
  
  for (var i = 0; i < 24; i++) {
    var ht = heights[i];
    if (ht === null) { h += '<div style="flex:1"></div>'; continue; }
    var pct = ((ht - minH) / range) * 100;
    if (pct < 3) pct = 3;
    var cls = i <= currentHour ? 'thnw' : 'thfu';
    h += '<div class="'+cls+'" style="height:'+pct.toFixed(0)+'%" title="'+i+':00 '+ht.toFixed(2)+'m"></div>';
  }
  
  h += '</div>';
  h += '<div class="tst"><span>00:00</span><span>12:00</span><span>23:00</span></div>';
  
  document.getElementById('tideChart').innerHTML = h;
}

function renderTideCurrent(exList) {
  if (!exList || exList.length == 0) return;
  var today = exList[0];
  if (!today || !today.extremes || today.extremes.length < 2) return;
  
  var now = new Date();
  var currentMin = now.getHours() * 60 + now.getMinutes();
  
  // Find current tide state
  var prev = null, next = null;
  for (var i = 0; i < today.extremes.length; i++) {
    var e = today.extremes[i];
    var eMin = e.hour * 60 + e.min;
    if (eMin <= currentMin) prev = e;
    if (eMin >= currentMin && !next) next = e;
  }
  
  if (!prev || !next) {
    // Before first tide or after last
    if (prev) {
      var first = today.extremes[0];
      var last = today.extremes[today.extremes.length - 1];
      var h = '<div class="tcur">🌊 下個漲退潮係 <b>'+first.time+'</b> ('+first.height_m.toFixed(2)+'m) — '+ (first.type=='high'?'🔺漲潮':'🔻退潮') +'</div>';
      document.getElementById('tideCurrent').innerHTML = h;
    }
    return;
  }
  
  var prevMin = prev.hour * 60 + prev.min;
  var nextMin = next.hour * 60 + next.min;
  var total = nextMin - prevMin;
  var elapsed = currentMin - prevMin;
  var pct = total > 0 ? Math.round((elapsed / total) * 100) : 0;
  
  var direction = prev.type == 'high' ? '退水中 📉' : '漲水中 📈';
  var nextIcon = next.type == 'high' ? '🔺漲潮' : '🔻退潮';
  
  var h = '<div class="tcur">🌊 目前 <b>'+direction+'</b>（'+pct+'%）<br>⏳ 下個'+nextIcon+'：<b>'+next.time+'</b> ('+next.height_m.toFixed(2)+'m)</div>';
  document.getElementById('tideCurrent').innerHTML = h;
}

async function loadTide(station, spotName) {
  station = station || (ACTIVE_SPOT ? FISHING_SPOTS[ACTIVE_SPOT] : 'CCH');
  spotName = spotName || ACTIVE_SPOT;
  if (!station) { station = 'CCH'; ACTIVE_SPOT = null; }
  
  document.getElementById('tideExtremes').innerHTML = '<div class="loading">⏳ 載入潮汐資料中...</div>';
  document.getElementById('tideChart').innerHTML = '';
  document.getElementById('tideCurrent').innerHTML = '';
  
  try {
    var r = await fetch('tide_data.json?_t=' + Date.now());
    var data = await r.json();
    var s = data.stations[station];
    if (!s) throw 'No data for station';
    
    document.getElementById('tideStationLabel').textContent = spotName ? '— ' + TIDE_STATIONS[station] + '（' + spotName + '）' : '— ' + TIDE_STATIONS[station];
    renderTideExtremes(s.extremes, station, spotName);
    renderTideChart(s.hourly);
    renderTideCurrent(s.extremes);
  } catch(e) {
    document.getElementById('tideExtremes').innerHTML = '<div style="text-align:center;padding:20px;color:#e74c3c">❌ 載入潮汐失敗</div>';
  }
}

loadTide();
</script>
