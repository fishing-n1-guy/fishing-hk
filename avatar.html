<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 頭像</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
  }
  .avatar-card {
    background: linear-gradient(145deg, #16213e, #0f3460);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;
  }
  canvas {
    border-radius: 50%;
    display: block;
    width: 400px;
    height: 400px;
    box-shadow: 0 0 30px rgba(100,200,255,0.3);
  }
  h2 {
    color: #e8e8e8;
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.8;
  }
</style>
</head>
<body>
<div class="avatar-card">
  <canvas id="avatar" width="800" height="800"></canvas>
  <h2>✨ Hermes 頭像 ✨</h2>
</div>
<script>
const c = document.getElementById('avatar');
const ctx = c.getContext('2d');
const W = 800, H = 800;
const cx = W/2, cy = H/2;

// Background - night neon vibe
const grad = ctx.createRadialGradient(cx, cy, 100, cx, cy, 500);
grad.addColorStop(0, '#2a1a3e');
grad.addColorStop(0.5, '#1a1a3e');
grad.addColorStop(1, '#0d0d1a');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);

// Neon background lights
for (let i = 0; i < 8; i++) {
  ctx.beginPath();
  ctx.arc(100 + Math.random()*600, 100 + Math.random()*600, 30 + Math.random()*60, 0, Math.PI*2);
  ctx.fillStyle = `hsla(${200 + i*40}, 80%, 60%, 0.08)`;
  ctx.fill();
}

// === BODY / SHOULDERS ===
// White jacket / shoulders
ctx.save();
ctx.beginPath();
ctx.ellipse(cx, cy + 150, 220, 110, 0, 0, Math.PI);
ctx.fillStyle = '#f0f0f0';
ctx.shadowColor = 'rgba(200,200,255,0.2)';
ctx.shadowBlur = 20;
ctx.fill();
ctx.restore();

// Jacket collar - green top underneath
ctx.beginPath();
ctx.ellipse(cx, cy + 60, 70, 40, 0, 0, Math.PI);
ctx.fillStyle = '#3a7d5a';
ctx.fill();

// Jacket V-neck line
ctx.beginPath();
ctx.moveTo(cx - 45, cy + 30);
ctx.lineTo(cx, cy + 70);
ctx.lineTo(cx + 45, cy + 30);
ctx.strokeStyle = '#e0e0e0';
ctx.lineWidth = 3;
ctx.stroke();

// === NECK ===
ctx.beginPath();
ctx.ellipse(cx, cy + 30, 28, 22, 0, 0, Math.PI*2);
ctx.fillStyle = '#e8c9a0';
ctx.fill();

// === HEAD ===
ctx.save();
ctx.shadowColor = 'rgba(255,200,150,0.3)';
ctx.shadowBlur = 25;
ctx.beginPath();
ctx.ellipse(cx, cy - 30, 95, 108, 0, 0, Math.PI*2);
ctx.fillStyle = '#e8c9a0';
ctx.fill();
ctx.restore();

// === HAIR - Long brown hair ===
ctx.save();
ctx.shadowColor = 'rgba(100,60,30,0.4)';
ctx.shadowBlur = 15;

// Main hair mass
ctx.beginPath();
ctx.ellipse(cx, cy - 35, 110, 125, 0, 0, Math.PI*2);
ctx.fillStyle = '#5a3a1a';
ctx.fill();

// Hair top volume
ctx.beginPath();
ctx.ellipse(cx, cy - 80, 80, 55, 0, Math.PI, 0);
ctx.fillStyle = '#5a3a1a';
ctx.fill();

// Hair sides - flowing down
ctx.beginPath();
ctx.ellipse(cx - 95, cy + 20, 28, 70, -0.2, 0, Math.PI*2);
ctx.fillStyle = '#5a3a1a';
ctx.fill();
ctx.beginPath();
ctx.ellipse(cx + 95, cy + 20, 28, 70, 0.2, 0, Math.PI*2);
ctx.fillStyle = '#5a3a1a';
ctx.fill();

// Hair front wisps
for (let i = 0; i < 5; i++) {
  const x = cx - 40 + i * 20;
  ctx.beginPath();
  ctx.ellipse(x, cy - 90 + i * 5, 12, 35 + i * 3, -0.1, 0, Math.PI*2);
  ctx.fillStyle = `hsl(30, 55%, ${20 + i * 3}%)`;
  ctx.fill();
}

ctx.restore();

// === FACE DETAILS ===

// Eyes
ctx.save();
[0, 1].forEach(side => {
  const ex = cx + (side ? 32 : -32);
  const ey = cy - 32;
  
  // Eye white
  ctx.beginPath();
  ctx.ellipse(ex, ey, 18, 14, 0, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  
  // Iris - brown
  ctx.beginPath();
  ctx.ellipse(ex, ey, 11, 12, 0, 0, Math.PI*2);
  const igrad = ctx.createRadialGradient(ex-2, ey-2, 2, ex, ey, 12);
  igrad.addColorStop(0, '#5a3a1a');
  igrad.addColorStop(0.7, '#3a2210');
  igrad.addColorStop(1, '#2a1a08');
  ctx.fillStyle = igrad;
  ctx.fill();
  
  // Pupil
  ctx.beginPath();
  ctx.ellipse(ex, ey, 5, 6, 0, 0, Math.PI*2);
  ctx.fillStyle = '#111';
  ctx.fill();
  
  // Eye highlight
  ctx.beginPath();
  ctx.ellipse(ex + 4, ey - 3, 4, 3, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fill();
  
  // Eyelashes / eye line
  ctx.beginPath();
  ctx.ellipse(ex, ey, 18, 14, 0, 0, Math.PI*2);
  ctx.strokeStyle = '#3a2a1a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // Eyelid line (top)
  ctx.beginPath();
  ctx.ellipse(ex, ey - 2, 19, 13, 0, Math.PI, 0);
  ctx.strokeStyle = '#4a3a2a';
  ctx.lineWidth = 2.5;
  ctx.stroke();
});

// Eyebrows
ctx.strokeStyle = '#4a2a10';
ctx.lineWidth = 3.5;
ctx.lineCap = 'round';
[-1, 1].forEach(s => {
  ctx.beginPath();
  ctx.moveTo(cx + s * 50, cy - 58);
  ctx.quadraticCurveTo(cx + s * 32, cy - 68, cx + s * 15, cy - 62);
  ctx.stroke();
});
ctx.restore();

// Nose
ctx.save();
ctx.beginPath();
ctx.moveTo(cx - 4, cy - 12);
ctx.lineTo(cx - 4, cy - 2);
ctx.strokeStyle = '#d4b080';
ctx.lineWidth = 2;
ctx.stroke();
ctx.beginPath();
ctx.ellipse(cx - 3, cy + 2, 5, 3, 0, 0, Math.PI*2);
ctx.fillStyle = '#d4b080';
ctx.fill();
ctx.restore();

// Smile
ctx.save();
ctx.beginPath();
ctx.arc(cx, cy + 8, 20, 0.15, Math.PI - 0.15);
ctx.strokeStyle = '#c07060';
ctx.lineWidth = 2.5;
ctx.stroke();

// Lips
ctx.beginPath();
ctx.arc(cx, cy + 8, 20, 0.1, Math.PI - 0.1);
ctx.strokeStyle = '#d48070';
ctx.lineWidth = 3;
ctx.stroke();

// Lower lip highlight
ctx.beginPath();
ctx.arc(cx, cy + 10, 16, 0.15, Math.PI - 0.15);
ctx.strokeStyle = 'rgba(220,150,140,0.4)';
ctx.lineWidth = 2;
ctx.stroke();
ctx.restore();

// Blush
ctx.save();
ctx.globalAlpha = 0.2;
[-1, 1].forEach(s => {
  ctx.beginPath();
  ctx.ellipse(cx + s * 60, cy + 5, 20, 12, 0, 0, Math.PI*2);
  ctx.fillStyle = '#ff9090';
  ctx.fill();
});
ctx.restore();

// === FISHING ROD (in right hand) ===
ctx.save();
ctx.strokeStyle = '#8B7355';
ctx.lineWidth = 5;
ctx.lineCap = 'round';
ctx.beginPath();
ctx.moveTo(cx + 70, cy + 90);
ctx.lineTo(cx + 180, cy - 60);
ctx.lineTo(cx + 220, cy - 140);
ctx.stroke();

// Fishing line
ctx.strokeStyle = 'rgba(200,200,200,0.6)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(cx + 220, cy - 140);
ctx.lineTo(cx + 260, cy - 80);
ctx.stroke();

// Fish on line
ctx.beginPath();
ctx.ellipse(cx + 265, cy - 75, 15, 8, 0.3, 0, Math.PI*2);
ctx.fillStyle = '#4a8fc0';
ctx.fill();
ctx.strokeStyle = '#3a7faf';
ctx.lineWidth = 1.5;
ctx.stroke();

// Fish tail
ctx.beginPath();
ctx.moveTo(cx + 278, cy - 73);
ctx.lineTo(cx + 290, cy - 85);
ctx.lineTo(cx + 290, cy - 65);
ctx.fillStyle = '#4a8fc0';
ctx.fill();
ctx.restore();

// === NEON SIGN (restaurant vibe in background) ===
ctx.save();
ctx.shadowColor = 'rgba(255,100,200,0.6)';
ctx.shadowBlur = 30;
ctx.font = 'bold 28px sans-serif';
ctx.fillStyle = '#ff66cc';
ctx.textAlign = 'center';
ctx.fillText('✦ FISHING QUEEN ✦', cx - 100, 120);
ctx.restore();

// Small neon dots decoration
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const rx = cx + Math.cos(angle) * 320;
  const ry = cy + Math.sin(angle) * 320;
  ctx.beginPath();
  ctx.arc(rx, ry, 4, 0, Math.PI*2);
  ctx.fillStyle = `hsl(${280 + i*15}, 80%, 70%)`;
  ctx.shadowColor = `hsl(${280 + i*15}, 80%, 70%)`;
  ctx.shadowBlur = 10;
  ctx.fill();
}

// === NAMETAG ===
ctx.save();
ctx.shadowBlur = 0;
ctx.font = 'bold 24px sans-serif';
ctx.fillStyle = '#ffffff';
ctx.textAlign = 'center';
ctx.shadowColor = 'rgba(0,0,0,0.5)';
ctx.shadowBlur = 5;
ctx.fillText('🐟 Jay\'s Assistant 🐟', cx, cy + 300);
ctx.restore();

console.log('Avatar drawn!');
</script>
</body>
</html>
